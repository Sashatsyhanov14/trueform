name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ljqnwmtzaoubimoguann.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqcW53bXR6YW91Ymltb2d1YW5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDU0MDAsImV4cCI6MjA5NDIyMTQwMH0.qKAGUeemuGMbkoKOJtfFCt5D8in7m6bWAZ-65EFULG4
          NEXT_PUBLIC_POSTHOG_KEY: phc_VGCu7BOgl1wga4FPm3xozF9uoazetZQzUHtcLijEM9Y
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com

      - name: Copy Files to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.ts,tsconfig.json"
          target: "/var/www/trueform"

      - name: SSH Command to Restart Application on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/trueform
            sed -i '/BOT_TOKEN=/d' .env || true
            echo "BOT_TOKEN=8998010501:AAHT50r13LyAXtJiK6ZmqhEN6F3KzSolVoY" >> .env
            sed -i '/NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=/d' .env || true
            echo "NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=trueformai_bot" >> .env
            sed -i '/VISION_MODEL=/d' .env || true
            echo "VISION_MODEL=openai/gpt-4o" >> .env
            npm ci --omit=dev
            pm2 reload trueform || pm2 start npm --name "trueform" -- start
            pm2 save
